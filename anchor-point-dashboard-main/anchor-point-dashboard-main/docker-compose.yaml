version: "3.2"

services:
#anchorpoint frontend service
  anchorpoint-frontend:
    build:
      context: /
      dockerfile: /var/lib/jenkins/workspace/Anchorpoint-Development/Frontend/dev.Dockerfile
    image: anchorpoint-frontend-image
    container_name: anchorpoint-frontend-container
 
#Nginx service to route the service request 
  nginx:
     image: nginx:latest
     container_name: nginx-container
     ports:
       - "80:80"
       - "443:443"
     volumes:
#Nginx configuration file path
       - /var/lib/jenkins/workspace/Anchorpoint-Development/nginx.conf:/etc/nginx/nginx.conf
       - /home/ubuntu/anchorpoint_secrets/ssl/ssl/chain.crt:/etc/nginx/chain.crt
       - /home/ubuntu/anchorpoint_secrets/ssl/ssl/ssl.key:/etc/nginx/ssl.key
       

#Network setup for 
networks:
  default:
    external:
      name: anchorpoint
